name: lint-test

on:
  push:

jobs:
  run:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.4"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: latest

      - name: check YML
        run: yq . .traefik.yml

      - name: go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "Error: go.mod or go.sum is not tidy. Run 'go mod tidy' locally and commit the changes."
            exit 1
          fi

      - name: go mod vendor
        run: |
          go mod vendor
          if ! git diff --exit-code vendor/; then
            echo "Error: vendor/ directory is not up-to-date. Run 'go mod vendor' locally and commit the changes."
            exit 1
          fi

      - name: unit test
        run: go test -v -skip 'TestStateOperationsWithinThreshold' -race ./...

      - name: generate coverage
        run: go test -skip 'TestStateOperationsWithinThreshold' -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v '/ci') || echo continue

      - name: upload coverage to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-test-labels:
    needs: [run]
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        traefik: [v3.6, v3.7, latest]
    env:
      TRAEFIK_TAG: ${{ matrix.traefik }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: run
        run: go run test.go
        working-directory: ./ci

      - name: capture logs
        if: ${{ always() }}
        run: docker compose logs --tail 100 nginx nginx2 traefik
        working-directory: ./ci

      - name: cleanup
        if: ${{ always() }}
        run: docker compose down
        working-directory: ./ci

  integration-test-multilayer-routing:
    needs: [run]
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        traefik: [v3.6, v3.7, latest]
    env:
      COMPOSE_FILE: docker-compose.multilayer.yml
      TRAEFIK_TAG: ${{ matrix.traefik }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: run
        run: go run test.go
        working-directory: ./ci

      - name: capture logs
        if: ${{ always() }}
        run: docker compose logs --tail 100 nginx nginx2 traefik
        working-directory: ./ci

      - name: cleanup
        if: ${{ always() }}
        run: docker compose down
        working-directory: ./ci
